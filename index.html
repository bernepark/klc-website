<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLC | KARTELLEÖS CAPITAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #000000;
            --bg-panel: #0a0a0a;
            --text-main: #e0e0e0;
            --text-muted: #555555;
            --ease: cubic-bezier(0.23, 1, 0.32, 1); /* 부드러운 애니메이션 효과 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; /* 커스텀 커서를 위해 기본 커서 숨김 */ }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh;
            overflow: hidden; /* 스크롤 없음 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            letter-spacing: -0.02em;
        }

        /* 1. 커스텀 커서 (비밀 조직 느낌의 디테일) */
        #cursor {
            width: 10px; height: 10px;
            background-color: var(--text-main);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference; /* 배경색에 따라 반전 */
            transition: transform 0.1s var(--ease);
            transform: translate(-50%, -50%);
        }

        /* 2. 배경 영상 (웅장함, 에너지 표현) */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            filter: grayscale(100%) brightness(50%); /* 무채색 및 어둡게 처리 */
        }
        .video-background video {
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* 3. 헤더 (최소화) */
        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0; /* 애니메이션 시작 전 */
            animation: fadeIn 2s var(--ease) forwards 0.5s;
        }
        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--text-main);
        }
        .status {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            display: flex; align-items: center;
        }
        .status::before {
            content: ''; display: inline-block;
            width: 6px; height: 6px;
            background-color: #333; /* 비활성화된 느낌의 다크 그레이 */
            border-radius: 50%; margin-right: 10px;
        }

        /* 4. 메인 (슬로건 - 웅장함의 핵심) */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }
        
        .main-slogan {
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 100; /* 아주 얇게 설정하여 세련미 강조 */
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            line-height: 1.4;
            color: var(--text-main);
            opacity: 0;
            animation: fadeInUp 2s var(--ease) forwards 1s;
        }
        
        .main-slogan strong {
            font-weight: 400; /* 일부 단어만 강조 */
            color: var(--white);
        }

        /* 5. 푸터 (비밀스러운 컨택트) */
        footer {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 2s var(--ease) forwards 1.5s;
        }
        .copyright { font-family: 'Syncopate', sans-serif; letter-spacing: 0.1em; }
        .contact-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
            border-bottom: 1px solid transparent;
        }
        .contact-link:hover { color: var(--text-main); border-bottom: 1px solid var(--text-main); }

        /* 애니메이션 정의 */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            header, footer { padding: 20px; }
            .logo { font-size: 1rem; }
            .main-slogan { font-size: 1.2rem; }
            #cursor { display: none; } /* 모바일에서는 커서 숨김 */
            * { cursor: auto; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="video-background">
        <video autoplay loop muted playsinline>
            <source src="bg-video2.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <div class="logo">KLC</div>
        <div class="status">Authorized Personnel Only</div>
    </header>

    <main>
        <h1 class="main-slogan">
            우리는 인간의 <strong>본능</strong>을 사명으로 삼아,<br>
            그 끝에 존재하는 <strong>행복</strong>을 숙명으로 완성합니다.
            Desire as Mission, Happiness as Destiny
        </h1>
    </main>

    <footer>
        <div class="copyright">KARTELLEÖS CAPITAL</div>
        <a href="mailto:secure@klc.capital" class="contact-link">Inquiry</a>
    </footer>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 링크 위에 호버했을 때 커서 확대 효과
        const links = document.querySelectorAll('a, button');
        links.forEach(link => {
            link.addEventListener('mouseenter', () => cursor.style.transform = 'translate(-50%, -50%) scale(2)');
            link.addEventListener('mouseleave', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');
        });
    </script>

</body>
</html>
